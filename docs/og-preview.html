<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>Minora — Open Graph Preview</title>
  <link rel="stylesheet" href="../src/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1280px;
      height: 640px;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--color-neutral-50);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .og-container {
      width: 1280px;
      height: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12);
      position: relative;
    }

    /* Subtle decorative elements */
    .og-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg,
        transparent,
        var(--color-accent-300) 20%,
        var(--color-accent-500) 50%,
        var(--color-accent-300) 80%,
        transparent
      );
    }

    .og-title {
      font-family: var(--font-serif);
      font-size: 64px;
      font-weight: var(--font-bold);
      color: var(--color-neutral-900);
      margin-bottom: var(--space-3);
      letter-spacing: var(--tracking-tight);
    }

    .og-tagline {
      font-size: 20px;
      color: var(--color-neutral-500);
      margin-bottom: var(--space-8);
      text-align: center;
      max-width: 640px;
      line-height: var(--leading-relaxed);
    }

    /* Component preview row */
    .og-preview {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }

    /* Fake button previews */
    .og-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      border-radius: var(--radius-sm);
      border: var(--border-width) solid transparent;
      white-space: nowrap;
    }

    .og-btn-primary {
      background: var(--color-accent-500);
      color: var(--color-neutral-50);
    }

    .og-btn-outline {
      background: transparent;
      color: var(--color-accent-600);
      border-color: var(--color-accent-400);
    }

    .og-btn-ghost {
      background: transparent;
      color: var(--color-accent-600);
    }

    /* Fake input */
    .og-input-preview {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border: var(--border-width) solid var(--color-neutral-200);
      border-radius: var(--radius-sm);
      background: #ffffff;
      color: var(--color-neutral-400);
      font-size: var(--text-sm);
      min-width: 180px;
    }

    /* Fake badge */
    .og-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-0-5) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
      background: var(--color-success-light);
      color: var(--color-success-dark);
      border: var(--border-width) solid var(--color-success-border);
    }

    .og-dot {
      width: var(--space-1-5);
      height: var(--space-1-5);
      border-radius: 9999px;
      background: var(--color-success);
    }

    /* Fake toast */
    .og-toast {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: #ffffff;
      border: var(--border-width) solid var(--color-success-border);
      border-left: 3px solid var(--color-success);
      border-radius: var(--radius-sm);
      box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.08);
      font-size: var(--text-sm);
      color: var(--color-neutral-800);
      max-width: 280px;
    }

    .og-toast-icon {
      color: var(--color-success);
    }

    /* Fake modal backdrop */
    .og-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgb(0 0 0 / 0.3);
      display: none;
    }

    /* Bottom bar */
    .og-footer {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      font-size: var(--text-xs);
      color: var(--color-neutral-400);
    }

    .og-footer span {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .og-footer-dot {
      width: var(--space-1-5);
      height: var(--space-1-5);
      border-radius: 9999px;
      background: var(--color-accent-500);
    }

    /* Badge pills */
    .og-badges {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }

    .og-badge-pill {
      padding: var(--space-0-5) var(--space-2);
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-wide);
    }

    .og-badge-version {
      background: var(--color-accent-50);
      color: var(--color-accent-700);
      border: var(--border-width) solid var(--color-accent-200);
    }

    .og-badge-license {
      background: var(--color-neutral-100);
      color: var(--color-neutral-600);
    }

    .og-badge-size {
      background: var(--color-neutral-100);
      color: var(--color-neutral-600);
    }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- Title -->
    <h1 class="og-title">Minora</h1>

    <!-- Badges -->
    <div class="og-badges">
      <span class="og-badge-pill og-badge-version">v0.1.0</span>
      <span class="og-badge-pill og-badge-license">MIT</span>
      <span class="og-badge-pill og-badge-size">22 KB gzipped</span>
    </div>

    <!-- Tagline -->
    <p class="og-tagline">Elegant minimalist UI kit — clean components with warm gold accent, zero dependencies.</p>

    <!-- Component previews -->
    <div class="og-preview">
      <span class="og-btn og-btn-primary">Button</span>
      <span class="og-btn og-btn-outline">Outline</span>
      <span class="og-btn og-btn-ghost">Ghost</span>
    </div>

    <div class="og-preview">
      <span class="og-input-preview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-neutral-400);flex-shrink:0;">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        you@example.com
      </span>
      <span class="og-badge"><span class="og-dot"></span> Active</span>
    </div>

    <div class="og-preview">
      <div class="og-toast">
        <svg class="og-toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        Changes saved
      </div>
    </div>

    <!-- Footer -->
    <div class="og-footer">
      <span><span class="og-footer-dot"></span> 18 components</span>
      <span>•</span>
      <span>Vanilla JS + CSS</span>
      <span>•</span>
      <span>CDN Ready</span>
    </div>
  </div>
</body>
</html>
